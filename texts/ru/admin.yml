help_ask_title: 📌 Введите заголовок кнопки в разделе «Помощь» (как её увидит клиент)
help_pick_type_intro: |
  Выберите тип кнопки для клиента:
  • <b>Ссылка</b> — одна строка URL (<code>https://</code>, <code>http://</code> или <code>tg://</code>), открывается во внешнем браузере или в Telegram.
  • <b>Текст</b> — материал в чате бота с кнопкой «Назад». Обычный текст: «голые» ссылки станут кликабельными автоматически; или разметка HTML как в Telegram (<code>&lt;b&gt;</code>, <code>&lt;a href=""&gt;</code>).

help_pick_type_use_buttons: Нажмите одну из кнопок под предыдущим сообщением («Ссылка» или «Текст»).

help_add_type_link_btn: 🔗 Ссылка
help_add_type_text_btn: 📄 Текст в меню

help_ask_url_only: |
  📎 Отправьте <b>одну строку</b> со ссылкой — она должна начинаться с <code>http://</code>, <code>https://</code> или <code>tg://</code>.

help_ask_article_body: |
  📄 Отправьте текст материала (можно несколько строк).
  Простой текст — адреса вроде <code>https://...</code> и <code>tg://...</code> станут кликабельными сами.
  Чтобы задать видимый текст ссылки вручную, используйте HTML: <code>&lt;a href="https://..."&gt;Подробнее&lt;/a&gt;</code>.

help_payload_empty: ⚠️ Пустое сообщение — отправьте ссылку или текст статьи
help_link_validation: ⚠️ Не удалось сохранить. Укажите одну строку-ссылку или текст материала
