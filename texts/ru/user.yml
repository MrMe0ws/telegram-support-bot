# Личные сообщения с клиентом (бот в ЛС)

blocked: |
  🚫 Обращения с вашего аккаунта ограничены

start: |
  👋 Здравствуйте!

  Напишите сообщение, если у вас есть вопрос, или нажмите кнопку <b>Помощь</b> ниже — там ответы на популярные вопросы.
  Оператор ответит вам в ближайшее время 🤖

# Старая справка по команде /help (кратко)
help: |
  💬 Используйте кнопки внизу экрана или опишите проблему сообщением

help_section_intro: |
  <b>📚 Популярные вопросы пользователей:</b>

btn_create_ticket: ✉️ Создать обращение
btn_help: ❓ Помощь

create_ticket_prompt: |
  ✍️ Опишите ваш вопрос или проблему. Можно отправить текст, фото, файлы, голосовые

forward_fallback: "[⚠️ не удалось переслать как медиа, uid={uid}]"

no_open_ticket: 📭 Нет открытого обращения — закрывать нечего.

help_text_back_btn: ⬅️ Назад к списку
help_item_not_found: ❓ Пункт устарел. Откройте «Помощь» снова.
help_text_missing: ⚠️ Текст материала пуст — сообщите администратору.

help_html_invalid: Некорректная разметка в материале. Проверьте теги (Telegram HTML) в админке или в YAML.
